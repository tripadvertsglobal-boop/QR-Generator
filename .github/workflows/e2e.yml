name: E2E

# Opt-in: runs only when the repo variable RUN_E2E is set to "true" and the
# required secrets exist. Until then it's skipped, so it never blocks PRs.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    if: ${{ vars.RUN_E2E == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          NEXT_PUBLIC_REDIRECT_DOMAIN: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          LINK_UNLOCK_SECRET: ${{ secrets.LINK_UNLOCK_SECRET }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
